<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <div id="header">

        <a href="index.html">Home</a>
        <a href="portfolio.html">Skills & Projects</a>
        <a href="contact.html">Contact</a>

    <div id="content">
        <h2>Get In Touch</h2>
        <p>If you'd like to discuss development opportunities, please fill out the form below.</p>

        <div id="error-message"></div>

        <form id="contactForm" action="index.html" method="GET">
            <label for="userName">Name:</label>
            <input type="text" id="userName" name="userName" placeholder="Your Name">

            <label for="userPhone">Phone Number (10 digits):</label>
            <input type="tel" id="userPhone" name="userPhone" placeholder="1234567890">

            <label for="userEmail">Email Address:</label>
            <input type="email" id="userEmail" name="userEmail" placeholder="your_email@example.com">

            <label for="userComments">Comments:</label>
            <textarea id="userComments" name="userComments" rows="5" placeholder="Your comments here..."></textarea>

            <button type="submit">Submit</button>
            <button type="reset">Clear Form</button>
        </form>
    </div>
